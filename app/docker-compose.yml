services:
  # 1. O Banco de Dados
  db:
    image: postgres:16
    container_name: market_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: market_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d market_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. O Mensageiro (Broker)
  redis:
    image: redis:alpine
    container_name: market_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 3. A nossa API FastAPI
  api:
    build: .
    container_name: market_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # 4. O Trabalhador Braçal (Celery Worker)
  worker:
    build: .
    container_name: market_worker
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # 5. O Agendador (Celery Beat)
  beat:
    build: .
    container_name: market_beat
    command: celery -A worker.celery_app beat --loglevel=info
    environment:
      - PYTHONPATH=/app
    depends_on:
      - worker
    volumes:
      - .:/app

  # 6. Observabilidade (Flower)
# 6. Observabilidade (Flower)
  flower:
    image: mher/flower:2.0
    container_name: market_flower
    environment:
      # Definir via ENV é mais robusto que via command no Docker
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
volumes:
  postgres_data:
